name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * *"

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Load manifest env
        run: |
          set -a
          source verify/manifest.env
          set +a
          echo "PORT=$PORT" >> "$GITHUB_ENV"
          echo "MODE=$MODE" >> "$GITHUB_ENV"
      - name: Start stack
        run: eval "$UP"
      - name: Wait for ready
        run: |
          for i in $(seq 1 30); do
            if eval "$READY" >/dev/null 2>&1; then
              echo "Stack ready"
              exit 0
            fi
            sleep 2
          done
          echo "Stack not ready after 60s"
          eval "$LOGS"
          exit 1
      - name: Install test deps & run acceptance
        run: |
          pip install httpx pytest
          API_BASE_URL=http://localhost:${PORT} pytest verify/acceptance/ -v
      - name: Tear down
        if: always()
        run: eval "$DOWN"
