name: Lint

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * *"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.8.0
      - run: ruff check .
